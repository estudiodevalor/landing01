  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"f8d680d6-ee6c-451b-8605-c3d1554f8586\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Cormorant Garamond';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"96d6009b-1048-4cac-80ce-e31de6f991f1\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Cormorant Garamond';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"44381168-67ad-49d1-a36a-9c6dc321c033\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Cormorant Garamond';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"b6f4385f-deee-4f4e-ac6b-8ebd3ad3bab1\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   CRM CICREI — Color tokens\n   Tema claro por defecto; [data-theme=\"dark\"] reasigna neutros.\n   Los colores de estado (embudo/pagos/feedback) se conservan\n   entre temas — sólo cambian los neutros y el primario.\n   ============================================================ */\n\n:root {\n  /* ---- Marca · Primario (derivado del azul del logo CICREI) ---- */\n  --primary: #0F6FC6;          /* acción principal, enlaces, activo */\n  --primary-dark: #0B4F92;     /* hover/pressed, texto sobre tintes */\n  --primary-light: #6BA8E5;    /* acentos suaves */\n  --primary-surface: #E8F1FB;  /* fondo de chips/iconos activos, tintes */\n  --primary-ring: rgba(15,111,198,.18); /* anillo de foco */\n\n  /* ---- Neutros (tema claro) ---- */\n  --background: #F9FAFB;\n  --surface: #FFFFFF;          /* card */\n  --border: #E5E7EB;\n  --text-primary: #111827;\n  --text-secondary: #6B7280;\n  --disabled: #D1D5DB;\n\n  /* ---- Embudo de ventas (estado del prospecto) ---- */\n  --funnel-nuevo: #3B82F6;\n  --funnel-contactado: #7DD3FC;\n  --funnel-seguimiento: #86EFAC;\n  --funnel-inscrito: #22C55E;\n  --funnel-inactivo: #FDE047;\n  --funnel-perdido: #EF4444;\n\n  /* ---- Pagos ---- */\n  --pago-pagado: #22C55E;\n  --pago-pagado-text: #15803D;\n  --pago-pendiente: #EAB308;\n  --pago-pendiente-text: #A16207;\n  --pago-vencido: #EF4444;\n  --pago-vencido-text: #B91C1C;\n\n  /* ---- Feedback del sistema ---- */\n  --success: #22C55E;\n  --error: #EF4444;\n  --warning: #F59E0B;\n  --info: #3B82F6;\n\n  /* texto sólido oscuro para feedback (legible sobre tinte @10%) */\n  --success-text: #15803D;\n  --error-text: #B91C1C;\n  --warning-text: #A16207;\n  --info-text: #1D4ED8;\n}\n\n[data-theme=\"dark\"] {\n  --primary: #3B8FE6;          /* se aclara para mantener contraste */\n  --primary-dark: #2C6FB8;\n  --primary-light: #6BA8E5;\n  --primary-surface: #16314F;  /* tinte azul oscuro para chips activos */\n  --primary-ring: rgba(59,143,230,.28);\n\n  --background: #0F172A;\n  --surface: #1E293B;\n  --border: #334155;\n  --text-primary: #F1F5F9;\n  --text-secondary: #94A3B8;\n  --disabled: #475569;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   CRM CICREI — Tipografía\n   Fuente única: Inter. Numéricos/código: JetBrains Mono.\n   Cargadas desde Google Fonts (ver fonts.css).\n   En móvil, cada tamaño baja un paso (ver --*-mobile).\n   ============================================================ */\n\n:root {\n  --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-mono: 'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;\n\n  /* Tamaños — escritorio */\n  --text-h1: 28px;\n  --text-h2: 22px;\n  --text-h3: 18px;\n  --text-body: 15px;\n  --text-label: 14px;\n  --text-caption: 13px;\n  --text-tiny: 11px;\n\n  /* Tamaños — móvil (un paso abajo donde aplica) */\n  --text-h1-mobile: 24px;\n  --text-h2-mobile: 20px;\n  --text-h3-mobile: 17px;\n\n  /* Pesos */\n  --weight-regular: 400;\n  --weight-medium: 500;\n  --weight-semibold: 600;\n  --weight-bold: 700;\n\n  /* Interlineado */\n  --leading-tight: 1.1;\n  --leading-heading: 1.25;\n  --leading-body: 1.6;\n}\n\n/* Helpers tipográficos opcionales (no obligatorios para consumir) */\n.cic-h1 { font-family: var(--font-sans); font-size: var(--text-h1); font-weight: var(--weight-bold); line-height: var(--leading-tight); color: var(--text-primary); letter-spacing: -0.01em; }\n.cic-h2 { font-family: var(--font-sans); font-size: var(--text-h2); font-weight: var(--weight-bold); line-height: var(--leading-heading); color: var(--text-primary); letter-spacing: -0.01em; }\n.cic-h3 { font-family: var(--font-sans); font-size: var(--text-h3); font-weight: var(--weight-semibold); line-height: var(--leading-heading); color: var(--text-primary); }\n.cic-body { font-family: var(--font-sans); font-size: var(--text-body); font-weight: var(--weight-regular); line-height: var(--leading-body); color: var(--text-primary); }\n.cic-label { font-family: var(--font-sans); font-size: var(--text-label); font-weight: var(--weight-medium); color: var(--text-primary); }\n.cic-caption { font-family: var(--font-sans); font-size: var(--text-caption); font-weight: var(--weight-regular); color: var(--text-secondary); }\n.cic-tiny { font-family: var(--font-sans); font-size: var(--text-tiny); font-weight: var(--weight-medium); color: var(--text-secondary); }\n.cic-mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }\n\n@media (max-width: 640px) {\n  .cic-h1 { font-size: var(--text-h1-mobile); }\n  .cic-h2 { font-size: var(--text-h2-mobile); }\n  .cic-h3 { font-size: var(--text-h3-mobile); }\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   CRM CICREI — Espaciado\n   Escala base 4px. Todo padding/margin/gap es múltiplo.\n   4 · 8 · 12 · 16 · 20 · 24 · 32 · 48\n   ============================================================ */\n\n:root {\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-12: 48px;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   CRM CICREI — Forma · radios, sombras, layout\n   ============================================================ */\n\n:root {\n  /* Radios */\n  --radius-sm: 6px;     /* chips pequeños, swatches */\n  --radius-md: 10px;    /* botones, inputs */\n  --radius-lg: 14px;    /* tarjetas, modales */\n  --radius-full: 999px; /* pills, avatares, FAB */\n\n  /* Sombras\n     1 · Cards\n     2 · Modales\n     3 · Overlays */\n  --shadow-1: 0 1px 2px rgba(16,24,40,.06), 0 1px 3px rgba(16,24,40,.10);\n  --shadow-2: 0 4px 12px rgba(16,24,40,.10), 0 12px 24px rgba(16,24,40,.06);\n  --shadow-3: 0 12px 32px rgba(16,24,40,.16), 0 24px 48px rgba(16,24,40,.10);\n\n  /* Borde estándar */\n  --border-width: 1px;\n\n  /* Layout */\n  --container-max: 1200px;\n  --sidebar-w: 240px;\n  --bottombar-h: 64px;\n\n  /* Breakpoints (referencia; usar en media queries) */\n  --bp-mobile: 640px;\n  --bp-tablet: 768px;\n  --bp-desktop: 1280px;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   CRM CICREI — Design System\n   Punto de entrada global. Sólo @import (sin reglas inline).\n   Los consumidores enlazan únicamente este archivo.\n   ============================================================ */\n\n/* =============================================== src: url(\"a1d98e57-80e9-45a7-af2c-c37c52c71974\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"b67f8992-7792-4098-9b40-573fb110cf30\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"66470d28-8bdc-4b06-a5e9-7ddc4d9d41aa\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"bee8b86b-168c-4721-ab74-31aed63497d0\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ============================================================\n   CRM CICREI — Color tokens\n   Tema claro por defecto; [data-theme=\"dark\"] reasigna neutros.\n   Los colores de estado (embudo/pagos/feedback) se conservan\n   entre temas — sólo cambian los neutros y el primario.\n   ============================================================ */\n\n:root {\n  /* ---- Marca · Primario (derivado del azul del logo CICREI) ---- */\n  --primary: #0F6FC6;          /* acción principal, enlaces, activo */\n  --primary-dark: #0B4F92;     /* hover/pressed, texto sobre tintes */\n  --primary-light: #6BA8E5;    /* acentos suaves */\n  --primary-surface: #E8F1FB;  /* fondo de chips/iconos activos, tintes */\n  --primary-ring: rgba(15,111,198,.18); /* anillo de foco */\n\n  /* ---- Neutros (tema claro) ---- */\n  --background: #F9FAFB;\n  --surface: #FFFFFF;          /* card */\n  --border: #E5E7EB;\n  --text-primary: #111827;\n  --text-secondary: #6B7280;\n  --disabled: #D1D5DB;\n\n  /* ---- Embudo de ventas (estado del prospecto) ---- */\n  --funnel-nuevo: #3B82F6;\n  --funnel-contactado: #7DD3FC;\n  --funnel-seguimiento: #86EFAC;\n  --funnel-inscrito: #22C55E;\n  --funnel-inactivo: #FDE047;\n  --funnel-perdido: #EF4444;\n\n  /* ---- Pagos ---- */\n  --pago-pagado: #22C55E;\n  --pago-pagado-text: #15803D;\n  --pago-pendiente: #EAB308;\n  --pago-pendiente-text: #A16207;\n  --pago-vencido: #EF4444;\n  --pago-vencido-text: #B91C1C;\n\n  /* ---- Feedback del sistema ---- */\n  --success: #22C55E;\n  --error: #EF4444;\n  --warning: #F59E0B;\n  --info: #3B82F6;\n\n  /* texto sólido oscuro para feedback (legible sobre tinte @10%) */\n  --success-text: #15803D;\n  --error-text: #B91C1C;\n  --warning-text: #A16207;\n  --info-text: #1D4ED8;\n}\n\n[data-theme=\"dark\"] {\n  --primary: #3B8FE6;          /* se aclara para mantener contraste */\n  --primary-dark: #2C6FB8;\n  --primary-light: #6BA8E5;\n  --primary-surface: #16314F;  /* tinte azul oscuro para chips activos */\n  --primary-ring: rgba(59,143,230,.28);\n\n  --background: #0F172A;\n  --surface: #1E293B;\n  --border: #334155;\n  --text-primary: #F1F5F9;\n  --text-secondary: #94A3B8;\n  --disabled: #475569;\n}\n\n/* ============================================================\n   CRM CICREI — Tipografía\n   Fuente única: Inter. Numéricos/código: JetBrains Mono.\n   Cargadas desde Google Fonts (ver fonts.css).\n   En móvil, cada tamaño baja un paso (ver --*-mobile).\n   ============================================================ */\n\n:root {\n  --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-mono: 'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;\n\n  /* Tamaños — escritorio */\n  --text-h1: 28px;\n  --text-h2: 22px;\n  --text-h3: 18px;\n  --text-body: 15px;\n  --text-label: 14px;\n  --text-caption: 13px;\n  --text-tiny: 11px;\n\n  /* Tamaños — móvil (un paso abajo donde aplica) */\n  --text-h1-mobile: 24px;\n  --text-h2-mobile: 20px;\n  --text-h3-mobile: 17px;\n\n  /* Pesos */\n  --weight-regular: 400;\n  --weight-medium: 500;\n  --weight-semibold: 600;\n  --weight-bold: 700;\n\n  /* Interlineado */\n  --leading-tight: 1.1;\n  --leading-heading: 1.25;\n  --leading-body: 1.6;\n}\n\n/* Helpers tipográficos opcionales (no obligatorios para consumir) */\n.cic-h1 { font-family: var(--font-sans); font-size: var(--text-h1); font-weight: var(--weight-bold); line-height: var(--leading-tight); color: var(--text-primary); letter-spacing: -0.01em; }\n.cic-h2 { font-family: var(--font-sans); font-size: var(--text-h2); font-weight: var(--weight-bold); line-height: var(--leading-heading); color: var(--text-primary); letter-spacing: -0.01em; }\n.cic-h3 { font-family: var(--font-sans); font-size: var(--text-h3); font-weight: var(--weight-semibold); line-height: var(--leading-heading); color: var(--text-primary); }\n.cic-body { font-family: var(--font-sans); font-size: var(--text-body); font-weight: var(--weight-regular); line-height: var(--leading-body); color: var(--text-primary); }\n.cic-label { font-family: var(--font-sans); font-size: var(--text-label); font-weight: var(--weight-medium); color: var(--text-primary); }\n.cic-caption { font-family: var(--font-sans); font-size: var(--text-caption); font-weight: var(--weight-regular); color: var(--text-secondary); }\n.cic-tiny { font-family: var(--font-sans); font-size: var(--text-tiny); font-weight: var(--weight-medium); color: var(--text-secondary); }\n.cic-mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }\n\n@media (max-width: 640px) {\n  .cic-h1 { font-size: var(--text-h1-mobile); }\n  .cic-h2 { font-size: var(--text-h2-mobile); }\n  .cic-h3 { font-size: var(--text-h3-mobile); }\n}\n\n/* ============================================================\n   CRM CICREI — Espaciado\n   Escala base 4px. Todo padding/margin/gap es múltiplo.\n   4 · 8 · 12 · 16 · 20 · 24 · 32 · 48\n   ============================================================ */\n\n:root {\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-12: 48px;\n}\n\n/* ============================================================\n   CRM CICREI — Forma · radios, sombras, layout\n   ============================================================ */\n\n:root {\n  /* Radios */\n  --radius-sm: 6px;     /* chips pequeños, swatches */\n  --radius-md: 10px;    /* botones, inputs */\n  --radius-lg: 14px;    /* tarjetas, modales */\n  --radius-full: 999px; /* pills, avatares, FAB */\n\n  /* Sombras\n     1 · Cards\n     2 · Modales\n     3 · Overlays */\n  --shadow-1: 0 1px 2px rgba(16,24,40,.06), 0 1px 3px rgba(16,24,40,.10);\n  --shadow-2: 0 4px 12px rgba(16,24,40,.10), 0 12px 24px rgba(16,24,40,.06);\n  --shadow-3: 0 12px 32px rgba(16,24,40,.16), 0 24px 48px rgba(16,24,40,.10);\n\n  /* Borde estándar */\n  --border-width: 1px;\n\n  /* Layout */\n  --container-max: 1200px;\n  --sidebar-w: 240px;\n  --bottombar-h: 64px;\n\n  /* Breakpoints (referencia; usar en media queries) */\n  --bp-mobile: 640px;\n  --bp-tablet: 768px;\n  --bp-desktop: 1280px;\n}\n\n<\u002Fstyle>\n  <script src=\"84d44200-4cc5-4bb8-a26b-204feb91f9be\"><\u002Fscript>\n  <style>\n    html { scroll-behavior: smooth; }\n    body { margin: 0; background: var(--background); font-family: var(--font-sans); color: var(--text-primary); -webkit-font-smoothing: antialiased; }\n    a { color: var(--primary); text-decoration: none; transition: color 150ms ease; }\n    a:hover { color: var(--primary-dark); }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div data-screen-label=\"Gracias CICREI\" style=\"min-height:100vh;background:var(--background)\">\n\n  <!-- ===== Header ===== -->\n  <header style=\"background:var(--surface);border-bottom:1px solid var(--border)\">\n    <div style=\"max-width:760px;margin:0 auto;padding:20px 24px;display:flex;align-items:center;gap:16px\">\n      <img src=\"b4d4fee5-5640-4928-b572-72ce8d62e337\" alt=\"CICREI\" style=\"height:64px;display:block\">\n      <span style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:40px;font-weight:600;letter-spacing:0.5px;color:var(--text-primary);margin-left:12px;white-space:nowrap\">Preparatoria<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"max-width:760px;margin:0 auto;padding:48px 24px 80px;display:flex;flex-direction:column;gap:32px\">\n\n    <!-- ===== Agradecimiento ===== -->\n    <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;gap:18px\">\n      <span style=\"display:inline-flex;width:64px;height:64px;align-items:center;justify-content:center;background:var(--primary-surface);border-radius:999px\">\n        <svg width=\"32\" height=\"32\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--primary)\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z\"><\u002Fpath><\u002Fsvg>\n      <\u002Fspan>\n      <span style=\"font-size:14px;font-weight:600;color:var(--primary)\">¡Tu cita quedó agendada!<\u002Fspan>\n      <h1 style=\"margin:0;font-size:34px;font-weight:700;line-height:1.15;letter-spacing:-0.02em;text-wrap:pretty;max-width:20ch\">¡Gracias por preocuparte por el futuro de tu hijo y permitirnos presentarte una alternativa!<\u002Fh1>\n      <p style=\"margin:0;font-size:17px;line-height:1.65;color:var(--text-secondary);max-width:52ch;text-wrap:pretty\">Acabas de dar uno de los pasos más importantes que un papá puede dar: considerar una opción por el bienestar emocional de tu hijo, no solo que termine su prepa. No te vas a arrepentir de esta decisión. Nos vemos pronto para platicarte nuestro método y aclarar cualquier duda que pudieras tener. <strong style=\"color:var(--text-primary)\">¡Nos emociona mucho poderte conocer!<\u002Fstrong><\u002Fp>\n      <p style=\"margin:0;font-size:15px;line-height:1.6;color:var(--text-primary);font-weight:600;max-width:48ch\">Te enviaremos la confirmación de tu cita y los detalles de tu visita.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- ===== Énfasis oferta ===== -->\n    <div style=\"background:var(--primary);color:#fff;border-radius:14px;padding:24px 28px;display:flex;flex-direction:column;gap:8px;text-align:center;box-shadow:var(--shadow-2)\">\n      <span style=\"font-size:13px;font-weight:700;letter-spacing:0.04em\">SOLO POR RESERVAR HOY TU CITA<\u002Fspan>\n      <h2 style=\"margin:0;font-size:26px;font-weight:700;line-height:1.2;letter-spacing:-0.01em\">Desbloqueas un ahorro de $15,290 pesos<\u002Fh2>\n      <p style=\"margin:0;font-size:14px;line-height:1.6;opacity:0.92;max-width:56ch;margin-inline:auto\">Este paquete de beneficios es exclusivo para quienes apartan su cita y deciden pagar su inscripción hoy. Es 100% reembolsable si después de visitarnos decides no continuar.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- ===== Lista de beneficios ===== -->\n    <div style=\"display:flex;flex-direction:column;gap:16px\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px\">\n        <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;display:flex;flex-direction:column;gap:6px;box-shadow:var(--shadow-1)\">\n          <span style=\"font-size:13px;font-weight:500;color:var(--text-secondary)\">Inscripción<\u002Fspan>\n          <span style=\"display:flex;align-items:baseline;gap:8px\"><span style=\"font-family:var(--font-mono);font-size:24px;font-weight:700;font-variant-numeric:tabular-nums\">$990<\u002Fspan><span style=\"font-family:var(--font-mono);font-size:14px;color:var(--text-secondary);text-decoration:line-through;font-variant-numeric:tabular-nums\">$3,990<\u002Fspan><\u002Fspan>\n          <span style=\"font-size:13px;color:var(--success-text);font-weight:500\">Ahorras $3,000<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;display:flex;flex-direction:column;gap:6px;box-shadow:var(--shadow-1)\">\n          <span style=\"font-size:13px;font-weight:500;color:var(--text-secondary)\">Incorporación ante la SEJ<\u002Fspan>\n          <span style=\"display:flex;align-items:baseline;gap:8px\"><span style=\"font-family:var(--font-mono);font-size:24px;font-weight:700;font-variant-numeric:tabular-nums\">Gratis<\u002Fspan><span style=\"font-family:var(--font-mono);font-size:14px;color:var(--text-secondary);text-decoration:line-through;font-variant-numeric:tabular-nums\">$1,650<\u002Fspan><\u002Fspan>\n          <span style=\"font-size:13px;color:var(--success-text);font-weight:500\">Ahorras $1,650<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;display:flex;flex-direction:column;gap:6px;box-shadow:var(--shadow-1)\">\n          <span style=\"font-size:13px;font-weight:500;color:var(--text-secondary)\">Material didáctico <span style=\"font-weight:400\">(primer libro sin costo)<\u002Fspan><\u002Fspan>\n          <span style=\"display:flex;align-items:baseline;gap:8px\"><span style=\"font-family:var(--font-mono);font-size:24px;font-weight:700;font-variant-numeric:tabular-nums\">$1,380<\u002Fspan><span style=\"font-family:var(--font-mono);font-size:14px;color:var(--text-secondary);text-decoration:line-through;font-variant-numeric:tabular-nums\">$2,070<\u002Fspan><\u002Fspan>\n          <span style=\"font-size:13px;color:var(--success-text);font-weight:500\">30% de descuento<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;display:flex;flex-direction:column;gap:6px;box-shadow:var(--shadow-1)\">\n          <span style=\"font-size:13px;font-weight:500;color:var(--text-secondary)\">Beca en colegiatura<\u002Fspan>\n          <span style=\"display:flex;align-items:baseline;gap:8px\"><span style=\"font-family:var(--font-mono);font-size:24px;font-weight:700;font-variant-numeric:tabular-nums\">$2,900<\u002Fspan><span style=\"font-family:var(--font-mono);font-size:14px;color:var(--text-secondary);text-decoration:line-through;font-variant-numeric:tabular-nums\">$3,850<\u002Fspan><\u002Fspan>\n          <span style=\"font-size:13px;color:var(--text-secondary)\">Mensual · sujeta a disponibilidad<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;display:flex;flex-direction:column;gap:6px;box-shadow:var(--shadow-1)\">\n          <span style=\"font-size:13px;font-weight:500;color:var(--text-secondary)\">Salidas curriculares<\u002Fspan>\n          <span style=\"display:flex;align-items:baseline;gap:8px\"><span style=\"font-family:var(--font-mono);font-size:24px;font-weight:700;font-variant-numeric:tabular-nums\">Gratis<\u002Fspan><span style=\"font-family:var(--font-mono);font-size:14px;color:var(--text-secondary);text-decoration:line-through;font-variant-numeric:tabular-nums\">$9,000<\u002Fspan><\u002Fspan>\n          <span style=\"font-size:13px;color:var(--success-text);font-weight:500\">Incluidas al apartar tu inscripción*<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--primary-surface);border:1px solid var(--primary);border-radius:10px;padding:16px 28px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:20px\">\n        <div style=\"display:flex;flex-direction:colum .6;font-weight:600\">Esquina Av. Industrial, Av. Federalistas 815 - 55, Piso 2, Real del Bosque, 45130 Zapopan, Jal.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- ===== Formulario de pago ===== -->\n    <div style=\"background:var(--surface);border:2px solid var(--primary);border-radius:14px;box-shadow:var(--shadow-2);padding:28px 28px 32px;display:flex;flex-direction:column;gap:20px\">\n      <div style=\"display:flex;flex-direction:column;gap:4px\">\n        <h2 style=\"margin:0;font-size:20px;font-weight:700;letter-spacing:-0.01em\">Activa tu promoción pagando tu inscripción<\u002Fh2>\n        <p style=\"margin:0;font-size:13px;color:var(--text-secondary)\">Déjanos tus datos y te enviamos la confirmación de tu depósito 100% reembolsable.<\u002Fp>\n      <\u002Fdiv>\n      <x-import component-from-global-scope=\"CRMCICREIDesignSystem_2be9f0.Input\" label=\"Correo electrónico\" type=\"email\" placeholder=\"tucorreo@ejemplo.com\" value=\"{{ correo }}\" sc-camel-on-change=\"{{ onCambioCorreo }}\" hint-size=\"100%,64px\"><\u002Fx-import>\n      <x-import component-from-global-scope=\"CRMCICREIDesignSystem_2be9f0.Input\" label=\"Teléfono / WhatsApp\" type=\"tel\" placeholder=\"33 0000 0000\" value=\"{{ telefono }}\" sc-camel-on-change=\"{{ onCambioTelefono }}\" hint-size=\"100%,64px\"><\u002Fx-import>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:8px\">\n        <x-import component-from-global-scope=\"CRMCICREIDesignSystem_2be9f0.Button\" size=\"lg\" sc-camel-on-click=\"{{ abrirPago }}\" hint-size=\"100%,46px\">Pagar $990 y activar mi promoción<\u002Fx-import>\n        <span style=\"display:inline-flex;align-items:center;gap:6px;background:var(--primary-surface);color:var(--primary-dark);font-size:13px;font-weight:700;padding:6px 14px;border-radius:999px;text-align:center\">ACTIVAR PROMOCIÓN DE $15,290 PESOS DE AHORRO<\u002Fspan>\n        <p style=\"margin:0;font-size:12px;color:var(--text-secondary);text-align:center;max-width:44ch\">Pago 100% reembolsable. Al continuar aceptas ser contactado para completar tu preinscripción.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===== Documentos a llevar ===== -->\n    <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-1);padding:24px 28px;display:flex;flex-direction:column;gap:12px\">\n      <h2 style=\"margin:0;font-size:17px;font-weight:600\">En caso de formalizar la inscripción, favor de llevar original y copia de:<\u002Fh2>\n      <ul style=\"margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:8px\">\n        <li style=\"display:flex;align-items:flex-start;gap:8px;font-size:14px;line-height:1.5\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--primary)\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;margin-top:2px\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>Acta de nacimiento<\u002Fli>\n        <li style=\"display:flex;align-items:flex-start;gap:8px;font-size:14px;line-height:1.5\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--primary)\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;margin-top:2px\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>CURP<\u002Fli>\n        <li style=\"display:flex;align-items:flex-start;gap:8px;font-size:14px;line-height:1.5\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--primary)\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;margin-top:2px\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>Certificado de secundaria<\u002Fli>\n        <li style=\"display:flex;align-items:flex-start;gap:8px;font-size:14px;line-height:1.5\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--primary)\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;margin-top:2px\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>1 fotografía tamaño credencial a color<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- ===== Footer ===== -->\n  <footer style=\"background:var(--surface);border-top:1px solid var(--border)\">\n    <div style=\"max-width:760px;margin:0 auto;padding:24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap\">\n      <img src=\"b4d4fee5-5640-4928-b572-72ce8d62e337\" alt=\"CICREI\" style=\"height:24px;display:block\">\n      <span style=\"font-size:13px;color:var(--text-secondary)\">© 2026 CICREI. Todos los derechos reservados.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: {&quot;width&quot;: 760, &quot;height&quot;: 1400},\n  &quot;urlPago&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;https://wa.me/5213324174057?text=Hola&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Contacto y pago&quot;}\n}\">\nclass Component extends DCLogic {\n  state = {\n    correo: '',\n    telefono: '',\n    datosPrevios: {},\n  };\n\n  componentDidMount() {\n    try {\n      const guardado = JSON.parse(localStorage.getItem('cicrei_preinscripcion') || '{}');\n      if (guardado && typeof guardado === 'object') this.setState({ datosPrevios: guardado });\n    } catch (e) {}\n  }\n\n  renderVals() {\n    const urlPago = this.props.urlPago ?? 'https://wa.me/5213324174057?text=Hola%2C%20quiero%20pagar%20mi%20ficha%20de%20preinscripci%C3%B3n%20para%20Prepa%20CICREI';\n    const prev = this.state.datosPrevios || {};\n\n    const construirMensaje = () => {\n      const partes = [\n        'Hola, ya agendé mi cita y quiero pagar mi inscripción de $990 para Prepa CICREI (promoción de $15,290 de ahorro).',\n        prev.nombreTutor && `Tutor: ${prev.nombreTutor}`,\n        prev.nombreAlumno && `Alumno: ${prev.nombreAlumno}`,\n        prev.edadAlumno && `Edad: ${prev.edadAlumno}`,\n        this.state.correo && `Correo: ${this.state.correo}`,\n        this.state.telefono && `Teléfono: ${this.state.telefono}`,\n      ].filter(Boolean);\n      return encodeURIComponent(partes.join('\\n'));\n    };\n\n    return {\n      correo: this.state.correo,\n      telefono: this.state.telefono,\n      onCambioCorreo: (e) => this.setState({ correo: e.target.value }),\n      onCambioTelefono: (e) => this.setState({ telefono: e.target.value }),\n      abrirPago: () => {\n        const base = urlPago.split('?')[0];\n        window.open(`${base}?text=${construirMensaje()}`, '_blank');\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
