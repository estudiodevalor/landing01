document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-size:13px; color:#FFE0CE; margin-top:4px;\">patentes internacionales<\u002Fdiv><\u002Fdiv>\n      <div style=\"padding:clamp(26px,4vw,36px) clamp(22px,4vw,40px); border-bottom:1px solid rgba(255,255,255,.2);\"><div style=\"font-family:'Space Grotesk',sans-serif; font-size:clamp(30px,5vw,38px); font-weight:600; letter-spacing:-0.02em;\">10+<\u002Fdiv><div style=\"font-size:13px; color:#FFE0CE; margin-top:4px;\">premios y reconocimientos<\u002Fdiv><\u002Fdiv>\n      <div style=\"padding:clamp(26px,4vw,36px) clamp(22px,4vw,40px); border-bottom:1px solid rgba(255,255,255,.2);\"><div style=\"font-family:'Space Grotesk',sans-serif; font-size:clamp(30px,5vw,38px); font-weight:600; letter-spacing:-0.02em;\">2022<\u002Fdiv><div style=\"font-size:13px; color:#FFE0CE; margin-top:4px;\">Emprendedor del Año · CANACO<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- PROBLEM -->\n  <div style=\"padding:clamp(60px,9vw,104px) clamp(20px,6vw,80px);\">\n    <div style=\"max-width:1200px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:700; letter-spacing:0.14em; color:#FF5500; margin-bottom:22px;\">EL PROBLEMA<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif; font-size:clamp(28px,5.5vw,42px); line-height:1.08; letter-spacing:-0.02em; font-weight:600; margin:0 0 18px; max-width:760px;\">Muchas PyMEs que ya facturan compiten por precio sin querer.<\u002Fh2>\n      <p style=\"font-size:clamp(16px,2.6vw,18px); line-height:1.6; color:#555; margin:0 0 clamp(40px,6vw,56px); max-width:700px;\">Tienen catálogo grande pero oferta difusa, y cada nueva iniciativa se la come el día a día. El resultado es la comoditización: el valor existe, pero ni se comunica ni se entrega de forma consistente.<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(min(100%,300px),1fr)); gap:clamp(16px,2vw,24px);\">\n        <div style=\"border:1px solid #E4E4E4; border-radius:14px; padding:clamp(28px,4vw,40px);\">\n          <div style=\"margin-bottom:16px;\"><span style=\"font-size:12px; font-weight:700; letter-spacing:0.1em; color:#fff; background:#FF5500; padding:5px 12px; border-radius:5px;\">COMUNICACIÓN<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:clamp(19px,3vw,22px); font-weight:700; margin-bottom:12px; letter-spacing:-0.01em;\">Comunican características, no beneficios<\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.6; color:#555; margin:0;\">El mercado no entiende por qué valen más, así que termina comparándolas solo por precio.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #E4E4E4; border-radius:14px; padding:clamp(28px,4vw,40px);\">\n          <div style=\"margin-bottom:16px;\"><span style=\"font-size:12px; font-weight:700; letter-spacing:0.1em; color:#fff; background:#1A1A1A; padding:5px 12px; border-radius:5px;\">OPERACIÓN<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:clamp(19px,3vw,22px); font-weight:700; margin-bottom:12px; letter-spacing:-0.01em;\">No entregan su valor de forma consistente<\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.6; color:#555; margin:0;\">La promesa varía de un cliente a otro porque todo depende del día a día y de la memoria del dueño.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- HOW IT WORKS -->\n  <div style=\"padding:clamp(60px,9vw,104px) clamp(20px,6vw,80px); background:#F7F7F7; border-top:1px solid #EEE; border-bottom:1px solid #EEE;\">\n    <div style=\"max-width:1200px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:700; letter-spacing:0.14em; color:#FF5500; margin-bottom:22px;\">CÓMO OPERA EL ESTUDIO<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif; font-size:clamp(28px,5.5vw,42px); line-height:1.08; letter-spacing:-0.02em; font-weight:600; margin:0 0 clamp(40px,6vw,56px); max-width:720px;\">Un diagnóstico define la ruta. Luego, Sprints a la carta —un mes cada uno.<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(min(100%,260px),1fr)); gap:clamp(16px,2vw,24px); margin-bottom:clamp(20px,3vw,28px);\">\n        <div style=\"background:#fff; border:1px solid #E4E4E4; border-radius:14px; padding:clamp(26px,3.5vw,36px);\">\n          <div style=\"font-family:'Space Grotesk',sans-serif; font-size:14px; font-weight:600; color:#FF5500; margin-bottom:14px;\">PRIMERO<\u002Fdiv>\n          <div style=\"font-size:clamp(18px,2.6vw,21px); font-weight:700; margin-bottom:10px; letter-spacing:-0.01em;\">Diagnóstico<\u002Fdiv>\n          <p style=\"font-size:15px; line-height:1.55; color:#555; margin:0;\">Leemos el mercado y el estado real de tu oferta. De ahí sale tu ruta priorizada de Sprints.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #E4E4E4; border-radius:14px; padding:clamp(26px,3.5vw,36px);\">\n          <div style=\"font-family:'Space Grotesk',sans-serif; font-size:14px; font-weight:600; color:#FF5500; margin-bottom:14px;\">CADA MES<\u002Fdiv>\n          <div style=\"font-size:clamp(18px,2.6vw,21px); font-weight:700; margin-bottom:10px; letter-spacing:-0.01em;\">Un Sprint<\u002Fdiv>\n          <p style=\"font-size:15px; line-height:1.55; color:#555; margin:0;\">Con entregable y costo claros. Algunas empresas necesitan los tres; otras, solo uno.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #E4E4E4; border-radius:14px; padding:clamp(26px,3.5vw,36px);\">\n          <div style=\"font-family:'Space Grotesk',sans-serif; font-size:14px; font-weight:600; color:#FF5500; margin-bottom:14px;\">CADA SEMANA<\u002Fdiv>\n          <div style=\"font-size:clamp(18px,2.6vw,21px); font-weight:700; margin-bottom:10px; letter-spacing:-0.01em;\">Un ritmo<\u002Fdiv>\n          <p style=\"font-size:15px; line-height:1.55; color:#555; margin:0;\">Sin abrumarse: el entregable del mes se logra avanzando poco a poco, semana a semana.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- weekly rhythm strip -->\n      <div style=\"background:#1A1A1A; border-radius:14px; padding:clamp(24px,3.5vw,34px); color:#fff; display:flex; align-items:center; gap:clamp(16px,3vw,28px); flex-wrap:wrap;\">\n        <div style=\"font-family:'Space Grotesk',sans-serif; font-size:clamp(15px,2.4vw,17px); font-weight:600; color:#fff;\">El ritmo semanal<\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:12px; flex-wrap:wrap; flex:1;\">\n          <span style=\"background:#FF5500; color:#fff; border-radius:8px; padding:9px 16px; font-size:13px; font-weight:600;\">Lunes · Foco<\u002Fspan>\n          <span style=\"color:#FF5500; font-weight:700;\">→<\u002Fspan>\n          <span style=\"background:#2D2D2D; color:#EEE; border-radius:8px; padding:9px 16px; font-size:13px; font-weight:600;\">Durante la semana · Ejecuta<\u002Fspan>\n          <span style=\"color:#FF5500; font-weight:700;\">→<\u002Fspan>\n          <span style=\"background:#2D2D2D; color:#EEE; border-radius:8px; padding:9px 16px; font-size:13px; font-weight:600;\">Viernes · Retro<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- SCORECARD SECTION -->\n  <div style=\"padding:clamp(60px,9vw,104px) clamp(20px,6vw,80px);\">\n    <div style=\"max-width:1200px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:700; letter-spacing:0.14em; color:#FF5500; margin-bottom:22px;\">EL SCORECARD · LA BRÚJULA<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif; font-size:clamp(28px,5.5vw,42px); line-height:1.08; letter-spacing:-0.02em; font-weight:600; margin:0 0 18px; max-width:720px;\">Una herramienta simple que el dueño sí usa.<\u002Fh2>\n      <p style=\"font-size:clamp(16px,2.6vw,18px); line-height:1.6; color:#555; margin:0 0 clamp(40px,6vw,56px); max-width:700px;\">Mide lo que a ti ya te importa. Traducimos el caos de fuentes —landing, redes, ERP o un conteo manual— en un norte claro y pocas pa
