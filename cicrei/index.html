  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

 sólo cambian los neutros y el primario.\n   ============================================================ */\n\n:root {\n  /* ---- Marca · Primario (derivado del azul del logo CICREI) ---- */\n  --primary: #0F6FC6;          /* acción principal, enlaces, activo */\n  --primary-dark: #0B4F92;     /* hover/pressed, texto sobre tintes */\n  --primary-light: #6BA8E5;    /* acentos suaves */\n  --primary-surface: #E8F1FB;  /* fondo de chips/iconos activos, tintes */\n  --primary-ring: rgba(15,111,198,.18); /* anillo de foco */\n\n  /* ---- Neutros (tema claro) ---- */\n  --background: #F9FAFB;\n  --surface: #FFFFFF;          /* card */\n  --border: #E5E7EB;\n  --text-primary: #111827;\n  --text-secondary: #6B7280;\n  --disabled: #D1D5DB;\n\n  /* ---- Embudo de ventas (estado del prospecto) ---- */\n  --funnel-nuevo: #3B82F6;\n  --funnel-contactado: #7DD3FC;\n  --funnel-seguimiento: #86EFAC;\n  --funnel-inscrito: #22C55E;\n  --funnel-inactivo: #FDE047;\n  --funnel-perdido: #EF4444;\n\n  /* ---- Pagos ---- */\n  --pago-pagado: #22C55E;\n  --pago-pagado-text: #15803D;\n  --pago-pendiente: #EAB308;\n  --pago-pendiente-text: #A16207;\n  --pago-vencido: #EF4444;\n  --pago-vencido-text: #B91C1C;\n\n  /* ---- Feedback del sistema ---- */\n  --success: #22C55E;\n  --error: #EF4444;\n  --warning: #F59E0B;\n  --info: #3B82F6;\n\n  /* texto sólido oscuro para feedback (legible sobre tinte @10%) */\n  --success-text: #15803D;\n  --error-text: #B91C1C;\n  --warning-text: #A16207;\n  --info-text: #1D4ED8;\n}\n\n[data-theme=\"dark\"] {\n  --primary: #3B8FE6;          /* se aclara para mantener contraste */\n  --primary-dark: #2C6FB8;\n  --primary-light: #6BA8E5;\n  --primary-surface: #16314F;  /* tinte azul oscuro para chips activos */\n  --primary-ring: rgba(59,143,230,.28);\n\n  --background: #0F172A;\n  --surface: #1E293B;\n  --border: #334155;\n  --text-primary: #F1F5F9;\n  --text-secondary: #94A3B8;\n  --disabled: #475569;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   CRM CICREI — Tipografía\n   Fuente única: Inter. Numéricos/código: JetBrains Mono.\n   Cargadas desde Google Fonts (ver fonts.css).\n   En móvil, cada tamaño baja un paso (ver --*-mobile).\n   ============================================================ */\n\n:root {\n  --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-mono: 'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;\n\n  /* Tamaños — escritorio */\n  --text-h1: 28px;\n  --text-h2: 22px;\n  --text-h3: 18px;\n  --text-body: 15px;\n  --text-label: 14px;\n  --text-caption: 13px;\n  --text-tiny: 11px;\n\n  /* Tamaños — móvil (un paso abajo donde aplica) */\n  --text-h1-mobile: 24px;\n  --text-h2-mobile: 20px;\n  --text-h3-mobile: 17px;\n\n  /* Pesos */\n  --weight-regular: 400;\n  --weight-medium: 500;\n  --weight-semibold: 600;\n  --weight-bold: 700;\n\n  /* Interlineado */\n  --leading-tight: 1.1;\n  --leading-heading: 1.25;\n  --leading-body: 1.6;\n}\n\n/* Helpers tipográficos opcionales (no obligatorios para consumir) */\n.cic-h1 { font-family: var(--font-sans); font-size: var(--text-h1); font-weight: var(--weight-bold); line-height: var(--leading-tight); color: var(--text-primary); letter-spacing: -0.01em; }\n.cic-h2 { font-family: var(--font-sans); font-size: var(--text-h2); font-weight: var(--weight-bold); line-height: var(--leading-heading); color: var(--text-primary); letter-spacing: -0.01em; }\n.cic-h3 { font-family: var(--font-sans); font-size: var(--text-h3); font-weight: var(--weight-semibold); line-height: var(--leading-heading); color: var(--text-primary); }\n.cic-body { font-family: var(--font-sans); font-size: var(--text-body); font-weight: var(--weight-regular); line-height: var(--leading-body); color: var(--text-primary); }\n.cic-label { font-family: var(--font-sans); font-size: var(--text-label); font-weight: var(--weight-medium); color: var(--text-primary); }\n.cic-caption { font-family: var(--font-sans); font-size: var(--text-caption); font-weight: var(--weight-regular); color: var(--text-secondary); }\n.cic-tiny { font-family: var(--font-sans); font-size: var(--text-tiny); font-weight: var(--weight-medium); color: var(--text-secondary); }\n.cic-mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }\n\n@media (max-width: 640px) {\n  .cic-h1 { font-size: var(--text-h1-mobile); }\n  .cic-h2 { font-size: var(--text-h2-mobile); }\n  .cic-h3 { font-size: var(--text-h3-mobile); }\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   CRM CICREI — Espaciado\n   Escala base 4px. Todo padding/margin/gap es múltiplo.\n   4 · 8 · 12 · 16 · 20 · 24 · 32 · 48\n   ============================================================ */\n\n:root {\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-12: 48px;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   CRM CICREI — Forma · radios, sombras, layout\n   ============================================================ */\n\n:root {\n  /* Radios */\n  --radius-sm: 6px;     /* chips pequeños, swatches */\n  --radius-md: 10px;    /* botones, inputs */\n  --radius-lg: 14px;    /* tarjetas, modales */\n  --radius-full: 999px; /* pills, avatares, FAB */\n\n  /* Sombras\n     1 · Cards\n     2 · Modales\n     3 · Overlays */\n  --shadow-1: 0 1px 2px rgba(16,24,40,.06), 0 1px 3px rgba(16,24,40,.10);\n  --shadow-2: 0 4px 12px rgba(16,24,40,.10), 0 12px 24px rgba(16,24,40,.06);\n  --shadow-3: 0 12px 32px rgba(16,24,40,.16), 0 24px 48px rgba(16,24,40,.10);\n\n  /* Borde estándar */\n  --border-width: 1px;\n\n  /* Layout */\n  --container-max: 1200px;\n  --sidebar-w: 240px;\n  --bottombar-h: 64px;\n\n  /* Breakpoints (referencia; usar en media queries) */\n  --bp-mobile: 640px;\n  --bp-tablet: 768px;\n  --bp-desktop: 1280px;\n}\n<\u002Fstyle>\n  <style>/* ==================================== */\n\n:root {\n  /* ---- Marca · Primario (derivado del azul del logo CICREI) ---- */\n  --primary: #0F6FC6;          /* acción principal, enlaces, activo */\n  --primary-dark: #0B4F92;     /* hover/pressed, texto sobre tintes */\n  --primary-light: #6BA8E5;    /* acentos suaves */\n  --primary-surface: #E8F1FB;  /* fondo de chips/iconos activos, tintes */\n  --primary-ring: rgba(15,111,198,.18); /* anillo de foco */\n\n  /* ---- Neutros (tema claro) ---- */\n  --background: #F9FAFB;\n  --surface: #FFFFFF;          /* card */\n  --border: #E5E7EB;\n  --text-primary: #111827;\n  --text-secondary: #6B7280;\n  --disabled: #D1D5DB;\n\n  /* ---- Embudo de ventas (estado del prospecto) ---- */\n  --funnel-nuevo: #3B82F6;\n  --funnel-contactado: #7DD3FC;\n  --funnel-seguimiento: #86EFAC;\n  --funnel-inscrito: #22C55E;\n  --funnel-inactivo: #FDE047;\n  --funnel-perdido: #EF4444;\n\n  /* ---- Pagos ---- */\n  --pago-pagado: #22C55E;\n  --pago-pagado-text: #15803D;\n  --pago-pendiente: #EAB308;\n  --pago-pendiente-text: #A16207;\n  --pago-vencido: #EF4444;\n  --pago-vencido-text: #B91C1C;\n\n  /* ---- Feedback del sistema ---- */\n  --success: #22C55E;\n  --error: #EF4444;\n  --warning: #F59E0B;\n  --info: #3B82F6;\n\n  /* texto sólido oscuro para feedback (legible sobre tinte @10%) */\n  --success-text: #15803D;\n  --error-text: #B91C1C;\n  --warning-text: #A16207;\n  --info-text: #1D4ED8;\n}\n\n[data-theme=\"dark\"] {\n  --primary: #3B8FE6;          /* se aclara para mantener contraste */\n  --primary-dark: #2C6FB8;\n  --primary-light: #6BA8E5;\n  --primary-surface: #16314F;  /* tinte azul oscuro para chips activos */\n  --primary-ring: rgba(59,143,230,.28);\n\n  --background: #0F172A;\n  --surface: #1E293B;\n  --border: #334155;\n  --text-primary: #F1F5F9;\n  --text-secondary: #94A3B8;\n  --disabled: #475569;\n}\n\n/* ============================================================\n   CRM CICREI — Tipografía\n   Fuente única: Inter. Numéricos/código: JetBrains Mono.\n   Cargadas desde Google Fonts (ver fonts.css).\n   En móvil, cada tamaño baja un paso (ver --*-mobile).\n   ============================================================ */\n\n:root {\n  --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-mono: 'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;\n\n  /* Tamaños — escritorio */\n  --text-h1: 28px;\n  --text-h2: 22px;\n  --text-h3: 18px;\n  --text-body: 15px;\n  --text-label: 14px;\n  --text-caption: 13px;\n  --text-tiny: 11px;\n\n  /* Tamaños — móvil (un paso abajo donde aplica) */\n  --text-h1-mobile: 24px;\n  --text-h2-mobile: 20px;\n  --text-h3-mobile: 17px;\n\n  /* Pesos */\n  --weight-regular: 400;\n  --weight-medium: 500;\n  --weight-semibold: 600;\n  --weight-bold: 700;\n\n  /* Interlineado */\n  --leading-tight: 1.1;\n  --leading-heading: 1.25;\n  --leading-body: 1.6;\n}\n\n/* Helpers tipográficos opcionales (no obligatorios para consumir) */\n.cic-h1 { font-family: var(--font-sans); font-size: var(--text-h1); font-weight: var(--weight-bold); line-height: var(--leading-tight); color: var(--text-primary); letter-spacing: -0.01em; }\n.cic-h2 { font-family: var(--font-sans); font-size: var(--text-h2); font-weight: var(--weight-bold); line-height: var(--leading-heading); color: var(--text-primary); letter-spacing: -0.01em; }\n.cic-h3 { font-family: var(--font-sans); font-size: var(--text-h3); font-weight: var(--weight-semibold); line-height: var(--leading-heading); color: var(--text-primary); }\n.cic-body { font-family: var(--font-sans); font-size: var(--text-body); font-weight: var(--weight-regular); line-height: var(--leading-body); color: var(--text-primary); }\n.cic-label { font-family: var(--font-sans); font-size: var(--text-label); font-weight: var(--weight-medium); color: var(--text-primary); }\n.cic-caption { font-family: var(--font-sans); font-size: var(--text-caption); font-weight: var(--weight-regular); color: var(--text-secondary); }\n.cic-tiny { font-family: var(--font-sans); font-size: var(--text-tiny); font-weight: var(--weight-medium); color: var(--text-secondary); }\n.cic-mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }\n\n@media (max-width: 640px) {\n  .cic-h1 { font-size: var(--text-h1-mobile); }\n  .cic-h2 { font-size: var(--text-h2-mobile); }\n  .cic-h3 { font-size: var(--text-h3-mobile); }\n}\n\n/* ============================================================\n   CRM CICREI — Espaciado\n   Escala base 4px. Todo padding/margin/gap es múltiplo.\n   4 · 8 · 12 · 16 · 20 · 24 · 32 · 48\n   ============================================================ */\n\n:root {\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-12: 48px;\n}\n\n/* ============================================================\n   CRM CICREI — Forma · radios, sombras, layout\n   ============================================================ */\n\n:root {\n  /* Radios */\n  --radius-sm: 6px;     /* chips pequeños, swatches */\n  --radius-md: 10px;    /* botones, inputs */\n  --radius-lg: 14px;    /* tarjetas, modales */\n  --radius-full: 999px; /* pills, avatares, FAB */\n\n  /* Sombras\n     1 · Cards\n     2 · Modales\n     3 · Overlays */\n  --shadow-1: 0 1px 2px rgba(16,24,40,.06), 0 1px 3px rgba(16,24,40,.10);\n  --shadow-2: 0 4px 12px rgba(16,24,40,.10), 0 12px 24px rgba(16,24,40,.06);\n  --shadow-3: 0 12px 32px rgba(16,24,40,.16), 0 24px 48px rgba(16,24,40,.10);\n\n  /* Borde estándar */\n  --border-width: 1px;\n\n  /* Layout */\n  --container-max: 1200px;\n  --sidebar-w: 240px;\n  --bottombar-h: 64px;\n\n  /* Breakpoints (referencia; usar en media queries) */\n  --bp-mobile: 640px;\n  --bp-tablet: 768px;\n  --bp-desktop: 1280px;\n}\n\n<\u002Fstyle>\n  <script src=\"950a51de-6d77-4be6-aabe-dc0240176241\"><\u002Fscript>\n  <style>\n    html { scroll-behavior: smooth; }\n    body { margin: 0; background: var(--background); font-family: var(--font-sans); color: var(--text-primary); -webkit-font-smoothing: antialiased; }\n    a { color: var(--primary); text-decoration: none; transition: color 150ms ease; }\n    a:hover { color: var(--primary-dark); }\n    summary::-webkit-details-marker { display: none; }\n    summary { list-style: none; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div data-screen-label=\"Landing Prepa CICREI\" style=\"min-height:100vh;background:var(--background)\">\n\n  <!-- ===== Header ===== -->\n  <header style=\"position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--border)\">\n    <div style=\"max-width:1080px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px\">\n      <a href=\"#inicio\" style=\"display:flex;align-items:center;gap:20px\">\n        <img src=\"assets/logo-cicrei.png\" alt=\"CICREI\" style=\"height:36px;display:block\">\n        <span style=\"font-size:17px;font-weight:600;letter-spacing:-0.01em;color:var(--text-primary)\">Preparatoria<\u002Fspan>\n      <\u002Fa>\n      <nav style=\"display:flex;align-items:center;gap:24px;font-size:14px;font-weight:500\">\n        <a href=\"#programa\" style=\"color:var(--text-secondary)\">El programa<\u002Fa>\n        <a href=\"#garantias\" style=\"color:var(--text-secondary)\">Garantías<\u002Fa>\n        <a href=\"#costos\" style=\"color:var(--text-secondary)\">Costos<\u002Fa>\n        <a href=\"#preguntas\" style=\"color:var(--text-secondary)\">Preguntas<\u002Fa>\n        <x-import component-from-global-scope=\"CRMCICREIDesignSystem_2be9f0.Button\" size=\"sm\" onclick=\"{{ abrirPago }}\" hint-size=\"150px,32px\">Pre-inscripción<\u002Fx-import>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== Hero ===== -->\n  <section id=\"inicio\" style=\"background:var(--surface);border-bottom:1px solid var(--border)\">\n    <div style=\"max-width:1080px;margin:0 auto;padding:64px 24px 56px;display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:48px;align-items:center\">\n      <div style=\"display:flex;flex-direction:column;gap:20px\">\n        <div style=\"display:flex;align-items:center;gap:8px\">\n          <span style=\"display:inline-flex;align-items:center;gap:6px;background:var(--primary-surface);color:var(--primary-dark);font-size:13px;font-weight:600;padding:5px 12px;border-radius:999px\">Inscripciones de julio abiertas · inicio de clases 31 de agosto<\u002Fspan>\n        <\u002Fdiv>\n        <h1 style=\"margin:0;font-size:42px;font-weight:700;line-height:1.12;letter-spacing:-0.02em;color:var(--text-primary);text-wrap:pretty\">La confianza no solo se construye en el salón de clases<\u002Fh1>\n        <p style=\"margin:0;font-size:17px;line-height:1.6;color:var(--text-secondary);max-width:52ch;text-wrap:pretty\">Prepa oficial en 24 meses con grupos reducidos, talleres vivenciales en el bosque y acompañamiento emocional — para que tu hijo no solo termine la prepa sino que aprenda herramientas emocionales que le servirán toda su vida.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:10px;align-items:flex-start\">\n          <x-import component-from-global-scope=\"CRMCICREIDesignSystem_2be9f0.Button\" size=\"lg\" onclick=\"{{ abrirPago }}\" hint-size=\"260px,46px\">Aparta su lugar por solo $99 pesos<\u002Fx-import>\n          <p style=\"margin:0;font-size:13px;color:var(--text-secondary);max-width:44ch\"><strong style=\"color:var(--text-primary)\">100% reembolsables<\u002Fstrong> si después de conocer el plantel decides no inscribirlo. Sin letras chiquitas.<\u002Fp>\n          <a href=\"#oferta\" style=\"font-size:14px;font-weight:600\">Promociones en Julio al apartar su lugar →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"min-height:340px;display:flex\">\n        <div style=\"position:relative;width:100%;min-height:340px\">\n          <img src=\"assets/hero-comunidad.jpg\" alt=\"Grupo de alumnos de CICREI en comunidad\" style=\"width:100%;height:100%;min-height:340px;object-fit:cover;border-radius:14px;display:block\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1080px;margin:0 auto;padding:0 24px 40px;display:flex;flex-wrap:wrap;gap:24px;align-items:center\">\n      <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 20px;display:flex;align-items:center;justify-content:center\">\n        <img src=\"d11a5412-3868-435f-8266-e2918d532416\" alt=\"Secretaría de Educación Pública\" style=\"height:52px;width:auto;display:block\">\n      <\u002Fdiv>\n      <div style=\"flex:1;min-width:300px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px\">\n      <span style=\"display:inline-flex;align-items:center;gap:8px;background:var(--background);border:1px solid var(--border);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:500;color:var(--text-primary)\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--primary)\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0\"><path d=\"M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z\"><\u002Fpath><path d=\"m9 12 2 2 4-4\"><\u002Fpath><\u002Fsvg>Validez oficial ante la Secretaría de Educación Jalisco<\u002Fspan>\n      <span style=\"display:inline-flex;align-items:center;gap:8px;background:var(--background);border:1px solid var(--border);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:500;color:var(--text-primary)\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--primary)\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M22 21v-2a4 4 0 0 0-3-3.87\"><\u002Fpath><path d=\"M16 3.13a4 4 0 0 1 0 7.75\"><\u002Fpath><\u002Fsvg>Grupos reducidos con atención personalizada<\u002Fspan>\n      <span style=\"display:inline-flex;align-items:center;gap:8px;background:var(--background);border:1px solid var(--border);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:500;color:var(--text-primary)\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--primary)\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M8 2v4\"><\u002Fpath><path d=\"M16 2v4\"><\u002Fpath><rect width=\"18\" height=\"18\" x=\"3\" y=\"4\" rx=\"2\"><\u002Frect><path d=\"M3 10h18\"><\u002Fpath><\u002Fsvg>24 meses · turnos matutino y vespertino<\u002Fspan>\n      <span style=\"display:inline-flex;align-items:center;gap:8px;background:var(--background);border:1px solid var(--border);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:500;color:var(--text-primary)\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--primary)\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>Sin promedio mínimo de ingreso<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== Barra de urgencia ===== -->\n  <section style=\"background:var(--primary-surface);border-bottom:1px solid var(--border)\">\n    <div style=\"max-width:1080px;margin:0 auto;padding:16px 24px;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:10px 24px\">\n      <span style=\"display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--primary-dark)\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--primary-dark)\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 6v6l4 2\"><\u002Fpath><\u002Fsvg>Promoción de julio: inscripción de <span style=\"text-decoration:line-through;font-weight:500\">$3,990<\u002Fspan> a $990 e incorporación gratis<\u002Fspan>\n      <span style=\"font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-size:14px;font-weight:600;color:var(--primary-dark)\">{{ cuentaRegresiva }}<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== El programa ===== -->\n  <section id=\"programa\" style=\"max-width:1080px;margin:0 auto;padding:72px 24px 0\">\n    <div style=\"max-width:640px;display:flex;flex-direction:column;gap:12px;margin-bottom:36px\">\n      <span style=\"font-size:14px;font-weight:600;color:var(--primary)\">El programa<\u002Fspan>\n      <h2 style=\"margin:0;font-size:30px;font-weight:700;line-height:1.2;letter-spacing:-0.01em\">Una prepa que mira lo académico y lo emocional<\u002Fh2>\n      <p style=\"margin:0;font-size:15px;line-height:1.6;color:var(--text-secondary);text-wrap:pretty\">Sabemos lo que es ver a un hijo con potencial atrapado detrás del miedo, detrás de las pantallas, la desmotivación o las heridas del bullying. Por eso el desarrollo emocional tiene el mismo peso que el académico durante los 24 meses.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px\">\n      <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;box-shadow:var(--shadow-1);display:flex;flex-direction:column;gap:12px\">\n        <span style=\"display:inline-flex;width:44px;height:44px;align-items:center;justify-content:center;background:var(--primary-surface);border-radius:999px\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--primary)\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z\"><\u002Fpath><path d=\"M22 10v6\"><\u002Fpath><path d=\"M6 12.5V16a6 3 0 0 0 12 0v-3.5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <h3 style=\"margin:0;font-size:18px;font-weight:600\">Bachillerato oficial en 24 meses<\u002Fh3>\n        <p style=\"margin:0;font-size:15px;line-height:1.6;color:var(--text-secondary)\">Plan incorporado a la Secretaría de Educación Jalisco con certificado de validez nacional: tu hijo puede ingresar a universidades públicas o privadas, incluida la UdG. Programa bilingüe con exámenes incluidos.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;box-shadow:var(--shadow-1);display:flex;flex-direction:column;gap:12px\">\n        <span style=\"display:inline-flex;width:44px;height:44px;align-items:center;justify-content:center;background:var(--primary-surface);border-radius:999px\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--primary)\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10 10v.2A3 3 0 0 1 8.9 16H5a3 3 0 0 1-1-5.8V10a3 3 0 0 1 6 0Z\"><\u002Fpath><path d=\"M7 16v6\"><\u002Fpath><path d=\"M13 19v3\"><\u002Fpath><path d=\"M12 19h8.3a1 1 0 0 0 .7-1.7L18 14h.3a1 1 0 0 0 .7-1.7L16 9h.2a1 1 0 0 0 .8-1.7L13 3l-1.4 1.5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <h3 style=\"margin:0;font-size:18px;font-weight:600\">12 talleres vivenciales en el bosque<\u002Fh3>\n        <p style=\"margin:0;font-size:15px;line-height:1.6;color:var(--text-secondary)\">Uno por bimestre, con valor curricular. Senderismo y dinámicas grupales diseñadas alrededor de una habilidad para la vida: manejar el miedo, confiar en un equipo, reconocer las propias capacidades.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;box-shadow:var(--shadow-1);display:flex;flex-direction:column;gap:12px\">\n        <span style=\"display:inline-flex;width:44px; t:600\">Ingreso a la UdG<\u002Fh3>\n        <p style=\"margin:0;font-size:14px;line-height:1.6;color:var(--text-secondary)\">Garantía de aprobación del examen de admisión a la UdG mediante nuestra alianza con UNx, bajo sus términos y condiciones.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== Costos ===== -->\n  <sc-if value=\"{{ mostrarPrecios }}\" hint-placeholder-val=\"{{ true }}\">\n    <section id=\"costos\" style=\"max-width:1080px;margin:0 auto;padding:72px 24px 0\">\n      <div style=\"max-width:640px;display:flex;flex-direction:column;gap:12px;margin-bottom:36px\">\n        <span style=\"font-size:14px;font-weight:600;color:var(--primary)\">Costos<\u002Fspan>\n        <h2 style=\"margin:0;font-size:30px;font-weight:700;line-height:1.2;letter-spacing:-0.01em\">Precios claros, sin cobros ocultos<\u002Fh2>\n        <p style=\"margin:0;font-size:15px;line-height:1.6;color:var(--text-secondary)\">Desde el inicio sabes qué incluye cada pago y cuándo corresponde. Existen becas y apoyos para alumnos de nuevo ingreso, sujetos a disponibilidad.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-1);overflow:hidden\">\n        <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1.4fr;gap:0;padding:14px 28px;background:var(--background);border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text-secondary)\">\n          <span>Concepto<\u002Fspan><span style=\"text-align:right\">Costo regular<\u002Fspan><span style=\"text-align:right\">Con promoción de julio<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1.4fr;align-items:center;padding:16px 28px;border-bottom:1px solid var(--border);font-size:15px\">\n          <span style=\"font-weight:500\">Ficha de preinscripción<\u002Fspan>\n          <span style=\"text-align:right;font-family:var(--font-mono);font-variant-numeric:tabular-nums\">$99<\u002Fspan>\n          <span style=\"text-align:right;font-size:13px;color:var(--text-secondary)\">Reembolsable tras la visita<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1.4fr;align-items:center;padding:16px 28px;border-bottom:1px solid var(--border);font-size:15px\">\n          <span style=\"font-weight:500\">Inscripción<\u002Fspan>\n          <span style=\"text-align:right;font-family:var(--font-mono);font-variant-numeric:tabular-nums;color:var(--text-secondary);text-decoration:line-through\">$3,990<\u002Fspan>\n          <span style=\"text-align:right;font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-weight:600\">$990<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1.4fr;align-items:center;padding:16px 28px;border-bottom:1px solid var(--border);font-size:15px\">\n          <span style=\"font-weight:500\">Incorporación (gestoría ante la SEJ)<\u002Fspan>\n          <span style=\"text-align:right;font-family:var(--font-mono);font-variant-numeric:tabular-nums;color:var(--text-secondary);text-decoration:line-through\">$1,650<\u002Fspan>\n          <span style=\"text-align:right;font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-weight:600\">Gratis<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1.4fr;align-items:center;padding:16px 28px;border-bottom:1px solid var(--border);font-size:15px\">\n          <span style=\"font-weight:500\">Colegiatura mensual (24 mensualidades)<\u002Fspan>\n          <span style=\"text-align:right;font-family:var(--font-mono);font-variant-numeric:tabular-nums\">$3,850<\u002Fspan>\n          <span style=\"text-align:right;font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-weight:600\">$2,900 con beca<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1.4fr;align-items:center;padding:16px 28px;border-bottom:1px solid var(--border);font-size:15px\">\n          <span style=\"font-weight:500\">Material didáctico<\u002Fspan>\n          <span style=\"text-align:right;font-family:var(--font-mono);font-variant-numeric:tabular-nums;color:var(--text-secondary);text-decoration:line-through\">$1,900 /sem<\u002Fspan>\n          <span style=\"text-align:right;font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-weight:600\">Sin costo<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1.4fr;align-items:center;padding:16px 28px;font-size:15px\">\n          <span style=\"font-weight:500\">Certificación final<\u002Fspan>\n          <span style=\"text-align:right;font-family:var(--font-mono);font-variant-numeric:tabular-nums;color:var(--text-secondary);text-decoration:line-through\">$3,100<\u002Fspan>\n          <span style=\"text-align:right;font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-weight:600\">$2,100<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:12px 0 0;font-size:13px;color:var(--text-secondary);line-height:1.6\">Exámenes ordinarios y extraordinarios incluidos sin pagos adicionales. Los costos de salidas y talleres se detallan en tu visita al plantel. Promoción de julio sujeta a disponibilidad; becas según vigencia.<\u002Fp>\n    <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- ===== Proceso ===== -->\n  <section style=\"max-width:1080px;margin:0 auto;padding:72px 24px 0\">\n    <div style=\"max-width:640px;display:flex;flex-direction:column;gap:12px;margin-bottom:36px\">\n      <span style=\"font-size:14px;font-weight:600;color:var(--primary)\">Cómo funciona<\u002Fspan>\n      <h2 style=\"margin:0;font-size:30px;font-weight:700;line-height:1.2;letter-spacing:-0.01em\">De la ficha al primer día de clases<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:20px\">\n      <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;box-shadow:var(--shadow-1);display:flex;flex-direction:column;gap:10px\">\n        <span style=\"display:inline-flex;width:32px;height:32px;align-items:center;justify-content:center;background:var(--primary);color:#fff;border-radius:999px;font-size:14px;font-weight:700\">1<\u002Fspan>\n        <h3 style=\"margin:0;font-size:16px;font-weight:600\">Paga tu ficha de $99<\u002Fh3>\n        <p style=\"margin:0;font-size:14px;line-height:1.6;color:var(--text-secondary)\">Hoy mismo, en línea. Aseguras tu lugar y los precios de la promoción de julio.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;box-shadow:var(--shadow-1);display:flex;flex-direction:column;gap:10px\">\n        <span style=\"display:inline-flex;width:32px;height:32px;align-items:center;justify-content:center;background:var(--primary);color:#fff;border-radius:999px;font-size:14px;font-weight:700\">2<\u002Fspan>\n        <h3 style=\"margin:0;font-size:16px;font-weight:600\">Visita el plantel<\u002Fh3>\n        <p style=\"margin:0;font-size:14px;line-height:1.6;color:var(--text-secondary)\">Conoce las instalaciones y ten la entrevista de diagnóstico con tu hijo. Sin promedio mínimo.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;box-shadow:var(--shadow-1);display:flex;flex-direction:column;gap:10px\">\n        <span style=\"display:inline-flex;width:32px;height:32px;align-items:center;justify-content:center;background:var(--primary);color:#fff;border-radius:999px;font-size:14px;font-weight:700\">3<\u002Fspan>\n        <h3 style=\"margin:0;font-size:16px;font-weight:600\">Entrega documentos<\u002Fh3>\n        <p style=\"margin:0;font-size:14px;line-height:1.6;color:var(--text-secondary)\">Acta de nacimiento, CURP, certificado de secundaria y una fotografía tamaño credencial a color.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;box-shadow:var(--shadow-1);display:flex;flex-direction:column;gap:10px\">\n        <span style=\"display:inline-flex;width:32px;height:32px;align-items:center;justify-content:center;background:var(--primary);color:#fff;border-radius:999px;font-size:14px;font-weight:700\">4<\u002Fspan>\n        <h3 style=\"margin:0;font-size:16px;font-weight:600\">Inscríbete con precio de julio<\u002Fh3>\n        <p style=\"margin:0;font-size:14px;line-height:1.6;color:var(--text-secondary)\">Pagas la inscripción con la promoción asegurada. Las clases inician el 31 de agosto.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin:16px 0 0;font-size:14px;color:var(--text-secondary)\">¿La visita no te convenció? Te devolvemos tus $99 en persona y quedamos como amigos.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ===== Preguntas frecuentes ===== -->\n  <section id=\"preguntas\" style=\"max-width:800px;margin:0 auto;padding:72px 24px 0\">\n    <div style=\"display:flex;flex-direction:column;gap:12px;margin-bottom:32px\">\n      <span style=\"font-size:14px;font-weight:600;color:var(--primary)\">Preguntas frecuentes<\u002Fspan>\n      <h2 style=\"margin:0;font-size:30px;font-weight:700;line-height:1.2;letter-spacing:-0.01em\">Lo que los papás necesitan resolver<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:12px\">\n      <details style=\"background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 22px\">\n        <summary style=\"font-size:15px;font-weight:600;cursor:pointer\">¿Qué pasa con mis $99 si al final decidimos no inscribir?<\u002Fsummary>\n        <p style=\"margin:10px 0 0;font-size:15px;line-height:1.6;color:var(--text-secondary)\">Se te devuelven en persona, completos. La ficha existe para apartar tu lugar y congelar la promoción mientras conoces el plantel — no para comprometerte.<\u002Fp>\n      <\u002Fdetails>\n      <details style=\"background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 22px\">\n        <summary style=\"font-size:15px;font-weight:600;cursor:pointer\">Ya lo cambié de escuela una vez, ¿por qué ésta sería distinta?<\u002Fsummary>\n        <p style=\"margin:10px 0 0;font-size:15px;line-height:1.6;color:var(--text-secondary)\">Porque lo académico no es nuestro único objetivo. Recibimos alumnos que vienen de experiencias escolares difíciles y la admisión inicia con una entrevista de diagnóstico para definir cómo acompañar a cada uno. Grupos reducidos, un responsable de acompañamiento emocional y seguimiento individual.<\u002Fp>\n      <\u002Fdetails>\n      <details style=\"background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 22px\">\n        <summary style=\"font-size:15px;font-weight:600;cursor:pointer\">¿Piden promedio mínimo para entrar?<\u002Fsummary>\n        <p style=\"margin:10px 0 0;font-size:15px;line-height:1.6;color:var(--text-secondary)\">No. Solo se requiere el certificado de secundaria. La admisión se realiza mediante una entrevista de diagnóstico con el alumno y su familia.<\u002Fp>\n      <\u002Fdetails>\n      <details style=\"background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 22px\">\n        <summary style=\"font-size:15px;font-weight:600;cursor:pointer\">¿El certificado tiene validez oficial?<\u002Fsummary>\n        <p style=\"margin:10px 0 0;font-size:15px;line-height:1.6;color:var(--text-secondary)\">Sí. El bachillerato está incorporado a la Secretaría de Educación Jalisco y el certificado tiene validez nacional: permite ingresar a universidades públicas y privadas, incluida la UdG.<\u002Fp>\n      <\u002Fdetails>\n      <details style=\"background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 22px\">\n        <summary style=\"font-size:15px;font-weight:600;cursor:pointer\">¿Las salidas al bosque son seguras?<\u002Fsummary>\n        <p style=\"margin:10px 0 0;font-size:15px;line-height:1.6;color:var(--text-secondary)\">Todas se realizan con protocolos de seguridad y personal capacitado. El primer día de cada taller es teórico y en el aula; las familias reciben la información logística con anticipación.<\u002Fp>\n      <\u002Fdetails>\n      <details style=\"background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 22px\">\n        <summary style=\"font-size:15px;font-weight:600;cursor:pointer\">¿Esto reemplaza la terapia?<\u002Fsummary>\n        <p style=\"margin:10px 0 0;font-size:15px;line-height:1.6;color:var(--text-secondary)\">No la reemplaza. Los talleres dan herramientas emocionales que acompañan al alumno mucho más allá de la prepa, y las familias disponen de una lista de recursos externos de apoyo emocional.<\u002Fp>\n      <\u002Fdetails>\n      <details style=\"background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 22px\">\n        <summary style=\"font-size:15px;font-weight:600;cursor:pointer\">¿Cómo sé si mi hijo realmente está mejorando?<\u002Fsummary>\n        <p style=\"margin:10px 0 0;font-size:15px;line-height:1.6;color:var(--text-secondary)\">Recibes información periódica sobre su avance académico y personal, además de avisos oportunos sobre pagos, salidas y actividades de cada semana.<\u002Fp>\n      <\u002Fdetails>\n      <details style=\"background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 22px\">\n        <summary style=\"font-size:15px;font-weight:600;cursor:pointer\">¿Qué horarios hay?<\u002Fsummary>\n        <p style=\"margin:10px 0 0;font-size:15px;line-height:1.6;color:var(--text-secondary)\">De lunes a viernes, en turno matutino de 9:00 a 13:00 h o vespertino de 14:00 a 18:00 h. El programa es para jóvenes de 15 a 20 años.<\u002Fp>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== CTA final ===== -->\n  <section style=\"max-width:1080px;margin:0 auto;padding:72px 24px 80px\">\n    <div style=\"background:#0F172A;border-radius:14px;padding:56px 32px;display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center\">\n      <h2 style=\"margin:0;font-size:32px;font-weight:700;line-height:1.2;letter-spacing:-0.01em;color:#F1F5F9;max-width:22ch;text-wrap:pretty\">Su lugar en el grupo de agosto se aparta con $99<\u002Fh2>\n      <p style=\"margin:0;font-size:15px;line-height:1.6;color:#94A3B8;max-width:52ch;text-wrap:pretty\">Grupos reducidos, cupo limitado. La promoción de julio termina el 31 y las clases inician el 31 de agosto. Si la visita no te convence, te devolvemos tu dinero.<\u002Fp>\n      <x-import component-from-global-scope=\"CRMCICREIDesignSystem_2be9f0.Button\" size=\"lg\" onclick=\"{{ abrirPago }}\" hint-size=\"280px,46px\">Pagar mi ficha de $99<\u002Fx-import>\n      <a href=\"{{ urlWhatsApp }}\" target=\"_blank\" style=\"font-size:14px;font-weight:500;color:#94A3B8\">¿Tienes dudas? Escríbenos por WhatsApp →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== Footer ===== -->\n  <footer style=\"background:var(--surface);border-top:1px solid var(--border)\">\n    <div style=\"max-width:1080px;margin:0 auto;padding:28px 24px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:16px\">\n      <img src=\"assets/logo-cicrei.png\" alt=\"CICREI\" style=\"height:28px;display:block\">\n      <div style=\"display:flex;align-items:center;gap:24px;font-size:13px\">\n        <a href=\"#oferta\" style=\"color:var(--text-secondary)\">Promoción de julio<\u002Fa>\n        <a href=\"https://estudiojgc.com/privacidad.html\" target=\"_blank\" style=\"color:var(--text-secondary)\">Aviso de privacidad<\u002Fa>\n      <\u002Fdiv>\n      <span style=\"font-size:13px;color:var(--text-secondary)\">© 2026 CICREI. Todos los derechos reservados.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;urlPago&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;https://wa.me/5213314715107?text=Hola%2C%20quiero%20pagar%20mi%20ficha%20de%20preinscripci%C3%B3n%20de%20%24100%20para%20Prepa%20CICREI&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Contacto y pago&quot;},\n  &quot;urlWhatsApp&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;https://wa.me/5213314715107?text=Hola%2C%20tengo%20dudas%20sobre%20Prepa%20CICREI&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Contacto y pago&quot;},\n  &quot;mostrarPrecios&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Contenido&quot;}\n}\">\nclass Component extends DCLogic {\n  renderVals() {\n    const deadline = new Date('2026-07-31T23:59:59-06:00');\n    const dias = Math.max(0, Math.ceil((deadline.getTime() - Date.now()) / 86400000));\n    const cuentaRegresiva = dias === 0\n      ? 'Último día de la promoción'\n      : (dias === 1 ? 'Queda 1 día' : 'Quedan ' + dias + ' días');\n\n    const urlPago = this.props.urlPago ?? 'https://wa.me/5213314715107?text=Hola%2C%20quiero%20pagar%20mi%20ficha%20de%20preinscripci%C3%B3n%20de%20%24100%20para%20Prepa%20CICREI';\n    const urlWhatsApp = this.props.urlWhatsApp ?? 'https://wa.me/5213314715107?text=Hola%2C%20tengo%20dudas%20sobre%20Prepa%20CICREI';\n\n    return {\n      cuentaRegresiva,\n      urlWhatsApp,\n      mostrarPrecios: this.props.mostrarPrecios ?? true,\n      abrirPago: () => { window.open(urlPago, '_blank'); },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
